name: Build APK

# Ye workflow tab chalega jab bhi aap "main" branch pe code push karoge
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:   # isse aap GitHub website se manually bhi "Run" bata sakte ho

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Repo ka code checkout karo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java setup karo (Android build ke liye zaroori hai)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Repo me pade GestureControlApp.zip ko extract karo
      - name: Unzip project
        run: unzip -o GestureControlApp.zip -d extracted

      # 4. Gradle setup karo (isse ./gradlew file ki zaroorat nahi padti)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 5. Debug APK build karo (extracted folder ke andar jaake)
      - name: Build Debug APK
        working-directory: extracted
        run: gradle assembleDebug

      # 5. Build hui APK ko "artifact" ke roop me upload karo
      #    taaki aap use GitHub se download kar sako
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gesture-control-debug-apk
          path: extracted/app/build/outputs/apk/debug/app-debug.apk
